<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Vector Ingestion</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; margin: 0; padding: 24px; }
    .card { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    h1 { margin: 0 0 16px; font-size: 1.4rem; color: #111827; }
    p { color: #4b5563; margin-top: 0; }
    label { display: block; font-weight: 600; margin-top: 12px; color: #374151; }
    input { width: 100%; margin-top: 6px; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 16px; width: 100%; border: none; padding: 12px; border-radius: 8px; background: #0f766e; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    pre { margin-top: 16px; background: #0b1020; color: #d1fae5; padding: 12px; border-radius: 8px; overflow: auto; min-height: 80px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Local Vector DB Ingestion</h1>
    <p>Runs without uvicorn. This page talks to a lightweight local Python runner.</p>
    <form id="ingestForm">
      <label for="class_number">Class Number</label>
      <input id="class_number" name="class_number" placeholder="e.g. 10" required />

      <label for="subject">Subject</label>
      <input id="subject" name="subject" placeholder="e.g. Science" required />

      <label for="zip_file">ZIP File (contains PDFs)</label>
      <input id="zip_file" name="zip_file" type="file" accept=".zip" required />

      <button id="submitBtn" type="submit">Upload and Build Vector DB</button>
    </form>

    <pre id="result">Result will appear here...</pre>
  </div>

  <script>
    const form = document.getElementById('ingestForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      result.textContent = 'Processing...';

      const data = new FormData(form);
      try {
        const res = await fetch('/upload', { method: 'POST', body: data });
        const json = await res.json();
        result.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        result.textContent = 'Error: ' + err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
